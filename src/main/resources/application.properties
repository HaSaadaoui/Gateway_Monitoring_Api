### Base de donnees production Sqlite ###
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:${DB_PATH}/mydatabase.db
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
hibernate.show_sql=true
#spring.datasource.username=
#spring.datasource.password=
spring.http.codecs.max-in-memory-size=100MB
springcodec.max-in-memory-size=100MB
spring.webflux.multipart.max-in-memory-size=100MB
sensor.multi.snapshot-concurrency=2
sensor.multi.snapshot-pace-ms=150
sensor.multi.snapshot-retries=5
sensor.multi.snapshot-timeout-seconds=15

sensor.multi.poll-interval-ms=12000
sensor.multi.poll-limit=150
sensor.multi.snapshot-app-limit=1000