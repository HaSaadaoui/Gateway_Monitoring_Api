name: Deploy to Azure Cloud with Docker Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Give execute permission to mvnw
        run: chmod +x ./mvnw

      - name: Build project
        run: ./mvnw clean package -DskipTests

      - name: Build and tag Docker image
        run: |
          docker build --platform linux/amd64 --no-cache -t localhost:5000/app-monitoring:latest .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Add runner IP to NSG
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV

          az network nsg rule delete \
            --resource-group rg-Smart-Building-Mantu \
            --nsg-name vm-sensorprocessor-1-nsg \
            --name GitHubActionsSSH 2>/dev/null || true

          az network nsg rule create \
            --resource-group rg-Smart-Building-Mantu \
            --nsg-name vm-sensorprocessor-1-nsg \
            --name GitHubActionsSSH \
            --priority 500 \
            --source-address-prefixes "$RUNNER_IP" \
            --destination-port-ranges 22 \
            --access Allow \
            --protocol Tcp \
            --direction Inbound

          echo "Waiting for NSG rule to propagate..."
          for i in {1..12}; do
            if nc -z -w5 ${{ secrets.AZURE_HOST }} 22 2>/dev/null; then
              echo "SSH port is open"
              break
            fi
            echo "Attempt $i/12: waiting 10s..."
            sleep 10
          done

      - name: SSH agent setup
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_PRIVATE_KEY }}

      - name: Stop and remove existing Docker container and image
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AZURE_USER }}@${{ secrets.AZURE_HOST }} '
            sudo docker stop monitoring || true
            sudo docker rm monitoring || true
            sudo docker rmi localhost:5000/app-monitoring:latest || true
          '

      - name: Copy Docker image to Azure Cloud
        run: |
          docker save localhost:5000/app-monitoring:latest -o image.tar
          gzip image.tar
          ssh -o StrictHostKeyChecking=no ${{ secrets.AZURE_USER }}@${{ secrets.AZURE_HOST }} \
            'rm -f /home/azureuser/appRest/image.tar.gz /home/azureuser/appRest/image.tar'
          scp -o StrictHostKeyChecking=no image.tar.gz \
            ${{ secrets.AZURE_USER }}@${{ secrets.AZURE_HOST }}:/home/azureuser/appRest/image.tar.gz
          ssh -o StrictHostKeyChecking=no ${{ secrets.AZURE_USER }}@${{ secrets.AZURE_HOST }} \
            'sudo bash -c "gunzip -f /home/azureuser/appRest/image.tar.gz && docker load -i /home/azureuser/appRest/image.tar"'

      - name: Run Docker Compose on Azure Cloud
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AZURE_USER }}@${{ secrets.AZURE_HOST }} \
            'sudo docker compose -f /opt/app/docker-compose.yml up -d --force-recreate monitoring'

      - name: Remove runner IP from NSG
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group rg-Smart-Building-Mantu \
            --nsg-name vm-sensorprocessor-1-nsg \
            --name GitHubActionsSSH
